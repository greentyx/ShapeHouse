<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShapeHouse — Cronograma</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .cron-layout { max-width: 1200px; margin: 0 auto; padding: 40px 40px 80px; }

    /* ── STREAK BANNER ────────────── */
    .streak-banner {
      background: var(--black-card);
      border: 1px solid var(--black-border);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      margin-bottom: 28px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 28px;
      position: relative;
      overflow: hidden;
    }
    .streak-banner::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(90deg, rgba(0,76,246,0.07) 0%, transparent 55%);
      pointer-events:none;
    }
    .streak-fire { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .streak-number {
      font-family: var(--font-display);
      font-size: 60px; font-weight: 900; line-height: 1; color: var(--blue);
    }
    .streak-number.on-fire { color: #f97316; text-shadow: 0 0 20px rgba(249,115,22,0.35); }
    .streak-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--white-muted); }
    .streak-stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .streak-stat { padding: 12px 20px; background: var(--white-soft); border-radius: var(--radius-sm); text-align: center; min-width: 72px; }
    .ss-val { font-family: var(--font-display); font-size: 28px; font-weight: 900; color: var(--blue); line-height: 1; }
    .ss-key { font-size: 10px; color: var(--white-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .week-dots { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .week-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--white-muted); }
    .week-dot-row { display: flex; gap: 5px; }
    .week-dot { width: 11px; height: 11px; border-radius: 3px; border: 1.5px solid var(--black-border); background: transparent; }
    .week-dot.done { background: var(--blue); border-color: var(--blue); }
    .week-dot.rest { background: #232323; border-color: #333; }
    .week-dot.today { border-color: var(--blue); }

    /* ── TOP BAR ──────────────────── */
    .cron-topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
    .cron-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

    /* ── TIMER ────────────────────── */
    .timer-widget {
      background: var(--black-card); border: 1px solid var(--black-border);
      border-radius: var(--radius); padding: 20px 28px;
      display: flex; align-items: center; gap: 24px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .timer-display { font-family: var(--font-display); font-size: 56px; font-weight: 900; color: var(--blue); line-height: 1; min-width: 140px; }
    .timer-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--white-muted); margin-bottom: 10px; }
    .timer-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── DAY TABS ─────────────────── */
    .semana-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 28px; }
    .day-tab {
      padding: 12px 8px; border-radius: var(--radius-sm); text-align: center; cursor: pointer;
      background: var(--black-card); border: 1.5px solid var(--black-border);
      transition: var(--transition); font-size: 12px; position: relative;
    }
    .day-tab:hover { border-color: rgba(0,76,246,0.4); }
    .day-tab.active { border-color: var(--blue); background: rgba(0,76,246,0.1); }
    .day-tab.descanso { opacity: 0.5; }
    .day-tab.descanso.active { opacity: 1; }
    .day-tab.concluido { border-color: #22c55e !important; background: rgba(34,197,94,0.07) !important; }
    .day-check { position:absolute; top:4px; right:4px; width:14px; height:14px; background:#22c55e; border-radius:50%; font-size:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; }
    .day-today-dot { position:absolute; top:4px; left:4px; width:5px; height:5px; background:var(--blue); border-radius:50%; }
    .day-tab-name { font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .day-tab-label { font-size:10px; color:var(--white-muted); }
    .day-tab-dot { width:6px; height:6px; border-radius:50%; margin:5px auto 0; }

    /* ── TREINO DETAIL ────────────── */
    .treino-detail { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius-lg); padding:36px 40px; animation:fadeIn 0.3s ease; }
    .treino-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; gap:20px; flex-wrap:wrap; }
    .treino-title-big { font-family:var(--font-display); font-size:44px; font-weight:900; text-transform:uppercase; line-height:1; }
    .treino-title-big span { color:var(--blue); }
    .treino-stats { display:flex; gap:14px; flex-wrap:wrap; }
    .ts-item { text-align:center; padding:14px 18px; background:var(--white-soft); border-radius:var(--radius-sm); }
    .ts-val { font-family:var(--font-display); font-size:24px; font-weight:900; color:var(--blue); }
    .ts-key { font-size:10px; color:var(--white-muted); text-transform:uppercase; letter-spacing:0.5px; }
    .prog-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.25); border-radius:var(--radius-sm); padding:6px 12px; font-size:12px; font-weight:600; color:#f97316; margin-top:8px; }
    .exercise-list { display:flex; flex-direction:column; gap:10px; margin-top:24px; }
    .exercise-item { display:grid; grid-template-columns:48px 1fr auto; align-items:center; gap:16px; padding:18px 20px; background:var(--black); border:1px solid var(--black-border); border-radius:var(--radius-sm); transition:var(--transition); position:relative; overflow:hidden; }
    .exercise-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--blue); transform:scaleY(0); transition:var(--transition); }
    .exercise-item:hover::before { transform:scaleY(1); }
    .exercise-item:hover { border-color:rgba(0,76,246,0.3); padding-left:24px; }
    .ei-number { width:36px; height:36px; background:var(--blue); border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:900; font-size:16px; }
    .ei-name { font-weight:600; font-size:15px; margin-bottom:2px; }
    .ei-muscles { font-size:12px; color:var(--white-muted); }
    .ei-meta { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .ei-reps { font-family:var(--font-display); font-size:22px; font-weight:900; color:var(--blue); white-space:nowrap; }
    .ei-reps.boosted { color:#f97316; }
    .ei-series { font-size:11px; color:var(--white-muted); white-space:nowrap; }
    .ei-descanso { font-size:11px; color:#f97316; white-space:nowrap; }

    /* ── CONCLUIR ─────────────────── */
    .concluir-section { margin-top:28px; padding-top:28px; border-top:1px solid var(--black-border); display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .btn-concluir { background:#22c55e; color:#fff; font-size:17px; font-weight:700; padding:18px 40px; border-radius:12px; border:none; cursor:pointer; transition:var(--transition); display:flex; align-items:center; gap:10px; font-family:var(--font-body); }
    .btn-concluir:hover { background:#16a34a; transform:translateY(-2px); box-shadow:0 0 30px rgba(34,197,94,0.3); }
    .btn-concluir:disabled { background:#166534; color:#4ade80; cursor:default; transform:none; box-shadow:none; }
    .concluir-hint { font-size:13px; color:var(--white-muted); line-height:1.5; }

    /* ── REST CARD ────────────────── */
    .rest-card { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius-lg); padding:64px 40px; text-align:center; }
    .rest-emoji { font-size:72px; margin-bottom:16px; }
    .rest-title { font-family:var(--font-display); font-size:44px; font-weight:900; text-transform:uppercase; color:var(--white-muted); margin-bottom:10px; }
    .rest-desc { color:var(--white-muted); font-size:16px; }

    /* ── COMPLETION MODAL ─────────── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:3000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.25s ease; }
    .completion-modal { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius-lg); padding:48px 40px; max-width:480px; width:100%; text-align:center; animation:fadeInUp 0.35s ease; position:relative; overflow:hidden; }
    .completion-modal::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 0%, rgba(34,197,94,0.1) 0%, transparent 55%); pointer-events:none; }
    .cm-icon { font-size:72px; margin-bottom:16px; display:block; }
    .cm-title { font-family:var(--font-display); font-size:44px; font-weight:900; text-transform:uppercase; color:#22c55e; margin-bottom:8px; line-height:1; }
    .cm-subtitle { color:var(--white-muted); font-size:15px; margin-bottom:28px; line-height:1.6; }
    .cm-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:24px; }
    .cm-stat { background:var(--white-soft); border-radius:var(--radius-sm); padding:14px 10px; }
    .cms-val { font-family:var(--font-display); font-size:32px; font-weight:900; color:#22c55e; line-height:1; }
    .cms-key { font-size:10px; color:var(--white-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
    .cm-conquistas { display:flex; flex-direction:column; gap:8px; margin-bottom:28px; }
    .cm-conquista-item { display:flex; align-items:center; gap:12px; background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.25); border-radius:var(--radius-sm); padding:12px 16px; text-align:left; animation:fadeInUp 0.4s ease; }
    .cm-cq-emoji { font-size:28px; }
    .cm-cq-title { font-weight:700; font-size:15px; color:#f97316; }
    .cm-cq-desc { font-size:12px; color:var(--white-muted); }

    /* ── CONFETTI ─────────────────── */
    .confetti-dot { position:fixed; pointer-events:none; z-index:4000; border-radius:2px; animation:confettiFall linear forwards; }
    @keyframes confettiFall { 0%{opacity:1;transform:translateY(0) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }

    /* ── RESPONSIVE ───────────────── */
    @media (max-width:900px) {
      .semana-grid { grid-template-columns:repeat(4,1fr); }
      .streak-banner { grid-template-columns:auto 1fr; }
      .week-dots { display:none; }
      .exercise-item { grid-template-columns:44px 1fr; }
      .ei-meta { flex-direction:row; gap:10px; align-items:center; grid-column:1/-1; }
    }
    @media (max-width:600px) {
      .cron-layout { padding:24px 20px 60px; }
      .semana-grid { grid-template-columns:repeat(4,1fr); }
      .treino-detail { padding:24px 20px; }
      .timer-widget { flex-direction:column; align-items:flex-start; gap:16px; }
      .timer-display { font-size:48px; }
      .streak-banner { grid-template-columns:1fr; gap:16px; }
      .streak-number { font-size:52px; }
      .completion-modal { padding:36px 24px; }
      .btn-concluir { width:100%; justify-content:center; }
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="page-header">
    <div class="section-tag">Semana atual</div>
    <h1 class="page-header-title">Seu <span>Cronograma</span></h1>
    <p class="page-header-sub" id="cron-subtitle">Carregando...</p>
  </div>
  <div class="cron-layout" id="cron-content"></div>
</div>

<script src="../script.js"></script>
<script src="../progression.js"></script>
<script>
  const MAP_DIA   = { 1:0, 2:1, 3:2, 4:3, 5:4, 6:5, 0:6 };
  const DIAS_ABR  = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  let currentDayIndex = 0;
  let cronograma = null;
  let timer      = null;

  function renderPage() {
    const user    = UserDB.getUser();
    const content = document.getElementById('cron-content');
    if (!user) {
      content.innerHTML = `<div class="no-user-card card-flat" style="text-align:center;padding:80px 40px">
        <div style="font-size:72px;margin-bottom:20px">📋</div>
        <h2 style="font-family:var(--font-display);font-size:36px;font-weight:900;text-transform:uppercase;margin-bottom:12px">Nenhum Cadastro</h2>
        <p style="color:var(--white-muted);margin-bottom:28px;font-size:16px">Cadastre seus dados para gerar seu cronograma personalizado.</p>
        <a href="cadastro.html" class="btn btn-primary btn-lg">→ Fazer Cadastro</a>
      </div>`;
      return;
    }

    cronograma = UserDB.getCronograma() || gerarCronograma(user);
    UserDB.setCronograma(cronograma);

    document.getElementById('cron-subtitle').textContent =
      `${user.nome} · Nível ${user.nivel.charAt(0).toUpperCase()+user.nivel.slice(1)} · IMC ${cronograma.imc} · Gerado em ${cronograma.geradoEm}`;

    currentDayIndex = MAP_DIA[new Date().getDay()] ?? 0;
    content.innerHTML = buildHTML(user, cronograma);

    timer = new WorkoutTimer(document.getElementById('timer-display'), document.getElementById('btn-timer-toggle'));
    timer.render();

    document.querySelectorAll('.day-tab').forEach((t, i) => t.addEventListener('click', () => selectDay(i)));
    document.getElementById('btn-timer-toggle').addEventListener('click', () => timer.toggle());
    document.getElementById('btn-timer-reset').addEventListener('click', () => timer.reset());
    document.getElementById('btn-regen').addEventListener('click', regenCron);

    selectDay(currentDayIndex);
  }

  function buildHTML(user, cron) {
    const cl      = classificarIMC(cron.imc);
    const stats   = ProgressionDB.getStats();
    const prog    = ProgressionDB.getNivelProg();
    const log     = ProgressionDB.getTreinosLog();
    const hojeIdx = MAP_DIA[new Date().getDay()] ?? 0;
    const onFire  = stats.streakAtual >= 7;
    const streakEmoji = stats.streakAtual >= 30 ? '🌟' : stats.streakAtual >= 7 ? '🔥' : stats.streakAtual > 0 ? '⚡' : '💤';

    const hoje      = new Date();
    const iniciaSeg = new Date(hoje);
    iniciaSeg.setDate(hoje.getDate() - ((hoje.getDay() + 6) % 7));
    const weekDots = Array.from({length:7}, (_, i) => {
      const d   = new Date(iniciaSeg);
      d.setDate(iniciaSeg.getDate() + i);
      const iso = d.toISOString().split('T')[0];
      const tipo = cron.semana[i]?.tipo;
      let cls = 'week-dot';
      if (log[iso])         cls += ' done';
      else if (tipo==='descanso') cls += ' rest';
      else if (i === hojeIdx)     cls += ' today';
      return `<div class="${cls}" title="${DIAS_ABR[i]}${log[iso]?' ✓':''}"></div>`;
    }).join('');

    const tabsHTML = cron.semana.map((d, i) => {
      const dotStyle  = d.tipo==='treino' ? 'background:var(--blue)' : d.tipo==='leve' ? 'background:#f97316' : 'background:#444';
      const diaISO    = _diaISO(i);
      const concluido = !!log[diaISO];
      let cls = 'day-tab' + (d.tipo==='descanso' ? ' descanso' : '') + (concluido ? ' concluido' : '');
      return `<div class="${cls}" data-idx="${i}">
        ${concluido ? '<div class="day-check">✓</div>' : ''}
        ${i===hojeIdx ? '<div class="day-today-dot"></div>' : ''}
        <div class="day-tab-name">${DIAS_ABR[i]}</div>
        <div class="day-tab-label">${d.label}</div>
        <div class="day-tab-dot" style="${dotStyle}"></div>
      </div>`;
    }).join('');

    return `
      <div class="streak-banner">
        <div class="streak-fire">
          <div class="streak-number ${onFire?'on-fire':''}">${streakEmoji} ${stats.streakAtual}</div>
          <div class="streak-label">dias consecutivos</div>
        </div>
        <div class="streak-stats">
          <div class="streak-stat"><div class="ss-val">${stats.totalTreinos}</div><div class="ss-key">Treinos totais</div></div>
          <div class="streak-stat"><div class="ss-val">${stats.streakMaior}</div><div class="ss-key">Maior streak</div></div>
          <div class="streak-stat"><div class="ss-val">${stats.semanaAtual}</div><div class="ss-key">Esta semana</div></div>
        </div>
        <div class="week-dots">
          <div class="week-label">Semana atual</div>
          <div class="week-dot-row">${weekDots}</div>
        </div>
      </div>
      <div class="cron-topbar">
        <div class="cron-meta">
          <span class="badge badge-blue">Nível: ${user.nivel.charAt(0).toUpperCase()+user.nivel.slice(1)}</span>
          <span class="badge ${cl.badge}">IMC: ${cron.imc} — ${cl.label}</span>
          ${prog.multiplicador>1.0?`<span class="badge" style="background:rgba(249,115,22,0.1);color:#f97316;border:1px solid rgba(249,115,22,0.3)">📈 ${prog.multiplicador.toFixed(2)}×</span>`:''}
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-regen">🔄 Regenerar</button>
      </div>
      <div class="timer-widget">
        <div>
          <div class="timer-label">⏱ Temporizador de Treino</div>
          <div class="timer-display" id="timer-display">00:00</div>
        </div>
        <div class="timer-actions">
          <button class="btn btn-primary" id="btn-timer-toggle">▶ Iniciar</button>
          <button class="btn btn-ghost" id="btn-timer-reset">↺ Resetar</button>
        </div>
      </div>
      <div class="semana-grid">${tabsHTML}</div>
      <div id="day-detail"></div>`;
  }

  function selectDay(idx) {
    currentDayIndex = idx;
    document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
    const dia     = cronograma.semana[idx];
    const detail  = document.getElementById('day-detail');
    const diaISO  = _diaISO(idx);
    const log     = ProgressionDB.getTreinosLog();
    const concluido = !!log[diaISO];

    if (dia.tipo === 'descanso') {
      detail.innerHTML = `<div class="rest-card">
        <div class="rest-emoji">${dia.label.includes('Total')?'😴':'🧘'}</div>
        <div class="rest-title">${dia.label}</div>
        <p class="rest-desc">${dia.descricao}</p>
        ${dia.label.includes('Ativo')?'<p style="color:var(--white-muted);font-size:14px;margin-top:14px">Sugestão: 20 min de caminhada leve ou alongamento</p>':''}
      </div>`;
      return;
    }

    const prog    = ProgressionDB.getNivelProg();
    const boosted = prog.multiplicador > 1.0;

    const exHTML = dia.exercicios.map((ex, i) => {
      const rb  = ProgressionDB.aplicarProgressao(ex.reps);
      const chg = boosted && rb !== ex.reps;
      const rd  = typeof rb === 'number' ? rb + 'x' : rb;
      return `<div class="exercise-item animate-fade-up-delay-${Math.min(i+1,5)}">
        <div class="ei-number">${i+1}</div>
        <div><div class="ei-name">${ex.icon} ${ex.nome}</div><div class="ei-muscles">${ex.musculos}</div></div>
        <div class="ei-meta">
          <div class="ei-reps ${chg?'boosted':''}">${rd}</div>
          <div class="ei-series">${ex.series} séries</div>
          <div class="ei-descanso">⏸ ${ex.descanso}</div>
        </div>
      </div>`;
    }).join('');

    const hojeIdx = MAP_DIA[new Date().getDay()] ?? 0;
    detail.innerHTML = `<div class="treino-detail">
      <div class="treino-header">
        <div>
          <div class="treino-title-big">${dia.label} — <span>${dia.dia}</span></div>
          <p style="color:var(--white-muted);font-size:14px;margin-top:6px">${dia.descricao}</p>
          ${boosted?`<div class="prog-badge">📈 Progressão ${prog.multiplicador.toFixed(2)}× ativa — reps em laranja foram aumentadas</div>`:''}
        </div>
        <div class="treino-stats">
          <div class="ts-item"><div class="ts-val">${dia.exercicios.length}</div><div class="ts-key">Exercícios</div></div>
          <div class="ts-item"><div class="ts-val">${dia.exercicios[0]?.series||3}</div><div class="ts-key">Séries</div></div>
          <div class="ts-item"><div class="ts-val">${dia.exercicios[0]?.descanso||'60s'}</div><div class="ts-key">Descanso</div></div>
        </div>
      </div>
      <div class="exercise-list">${exHTML}</div>
      <div class="concluir-section">
        ${concluido
          ? `<div style="display:flex;align-items:center;gap:12px">
               <div style="width:40px;height:40px;background:rgba(34,197,94,0.15);border:2px solid #22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px">✓</div>
               <div><div style="font-weight:700;color:#22c55e;font-size:15px">Treino concluído!</div><div style="font-size:12px;color:var(--white-muted)">Registrado hoje</div></div>
             </div>`
          : `<div class="concluir-hint"><strong style="color:var(--white)">Terminou o treino?</strong><br>Marque como concluído para registrar no seu streak.</div>`
        }
        <button class="btn-concluir" id="btn-concluir" ${concluido?'disabled':''} onclick="concluirTreino('${dia.label}', ${idx})">
          ${concluido ? '✓ Concluído' : '🏁 Concluir Treino'}
        </button>
      </div>
    </div>`;
  }

  function concluirTreino(label, idx) {
    const duracao = timer ? timer.seconds : 0;
    const novas   = ProgressionDB.registrarTreino(label, duracao);
    const stats   = ProgressionDB.getStats();

    // Atualiza tab
    const tab = document.querySelectorAll('.day-tab')[idx];
    if (tab) {
      tab.classList.add('concluido');
      if (!tab.querySelector('.day-check')) {
        const chk = document.createElement('div');
        chk.className = 'day-check'; chk.textContent = '✓';
        tab.appendChild(chk);
      }
    }

    // Atualiza streak banner
    const numEl = document.querySelector('.streak-number');
    if (numEl) {
      numEl.textContent = `${stats.streakAtual>=30?'🌟':stats.streakAtual>=7?'🔥':'⚡'} ${stats.streakAtual}`;
      if (stats.streakAtual >= 7) numEl.classList.add('on-fire');
    }
    const ssVals = document.querySelectorAll('.ss-val');
    if (ssVals[0]) ssVals[0].textContent = stats.totalTreinos;
    if (ssVals[1]) ssVals[1].textContent = stats.streakMaior;
    if (ssVals[2]) ssVals[2].textContent = stats.semanaAtual;

    // Atualiza week dots
    const log  = ProgressionDB.getTreinosLog();
    const hoje = new Date();
    const ini  = new Date(hoje); ini.setDate(hoje.getDate()-((hoje.getDay()+6)%7));
    document.querySelectorAll('.week-dot').forEach((d, i) => {
      const day = new Date(ini); day.setDate(ini.getDate()+i);
      if (log[day.toISOString().split('T')[0]]) d.classList.add('done');
    });

    // Desabilita botão
    const btn = document.getElementById('btn-concluir');
    if (btn) { btn.disabled = true; btn.textContent = '✓ Concluído'; }
    if (timer) timer.pause();

    showCompletionModal(label, stats, novas, duracao);
  }

  function showCompletionModal(label, stats, novas, duracao) {
    const min = Math.floor(duracao/60), seg = duracao%60;
    const dur = duracao > 0 ? `${min}min ${String(seg).padStart(2,'0')}s` : '—';

    const cqHTML = novas.length ? `<div style="margin-bottom:24px">
      <div style="font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#f97316;margin-bottom:10px">🏆 Conquista desbloqueada!</div>
      <div class="cm-conquistas">${novas.map(c=>`
        <div class="cm-conquista-item">
          <div class="cm-cq-emoji">${c.emoji}</div>
          <div><div class="cm-cq-title">${c.titulo}</div><div class="cm-cq-desc">${c.desc}</div></div>
        </div>`).join('')}</div></div>` : '';

    const el = document.createElement('div');
    el.className = 'modal-overlay'; el.id = 'completion-overlay';
    el.innerHTML = `<div class="completion-modal">
      <span class="cm-icon">🎉</span>
      <div class="cm-title">Treino<br>Concluído!</div>
      <p class="cm-subtitle"><strong style="color:var(--white)">${label}</strong> registrado com sucesso.<br>Continue assim para manter seu streak!</p>
      <div class="cm-stats">
        <div class="cm-stat"><div class="cms-val">${stats.streakAtual}${stats.streakAtual>=7?'🔥':''}</div><div class="cms-key">Streak</div></div>
        <div class="cm-stat"><div class="cms-val">${stats.totalTreinos}</div><div class="cms-key">Treinos</div></div>
        <div class="cm-stat"><div class="cms-val" style="font-size:20px">${dur}</div><div class="cms-key">Duração</div></div>
      </div>
      ${cqHTML}
      <button class="btn btn-primary btn-full" onclick="fecharModal()">Continuar 💪</button>
      <p style="margin-top:12px;font-size:12px;color:var(--white-muted)">
        Veja seu progresso no <a href="perfil.html" style="color:var(--blue)">Painel do Perfil</a>
      </p>
    </div>`;
    document.body.appendChild(el);
    document.body.style.overflow = 'hidden';
    launchConfetti();
  }

  function fecharModal() {
    const o = document.getElementById('completion-overlay');
    if (o) o.remove();
    document.body.style.overflow = '';
  }

  function launchConfetti() {
    const colors = ['#004CF6','#22c55e','#f97316','#fff','#f0abfc','#facc15'];
    for (let i = 0; i < 70; i++) {
      setTimeout(() => {
        const d = document.createElement('div');
        d.className = 'confetti-dot';
        d.style.cssText = `left:${Math.random()*100}vw;top:-10px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s`;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 4000);
      }, i * 25);
    }
  }

  function regenCron() {
    const user = UserDB.getUser(); if (!user) return;
    cronograma = gerarCronograma(user);
    UserDB.setCronograma(cronograma);
    UserDB.addHistorico({ tipo:'Cronograma Regenerado', nivel:user.nivel, imc:cronograma.imc });
    showToast('Cronograma regenerado! ✅','success');
    renderPage();
  }

  function _diaISO(diaIdx) {
    const hoje    = new Date();
    const hojeIdx = MAP_DIA[hoje.getDay()] ?? 0;
    const d       = new Date(hoje);
    d.setDate(hoje.getDate() + (diaIdx - hojeIdx));
    return d.toISOString().split('T')[0];
  }

  renderPage();
</script>
</body>
</html>
