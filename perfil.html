<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShapeHouse — Perfil</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .perfil-layout { max-width: 1200px; margin: 0 auto; padding: 48px 40px 80px; }

    /* ── PROFILE HERO ─────────────── */
    .profile-hero {
      background: linear-gradient(135deg, rgba(0,76,246,0.12) 0%, transparent 60%);
      border: 1px solid rgba(0,76,246,0.2);
      border-radius: var(--radius-lg);
      padding: 36px 40px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 28px; align-items: center; margin-bottom: 28px;
    }
    .avatar { width:88px; height:88px; background:var(--blue); border-radius:22px; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:44px; font-weight:900; flex-shrink:0; }
    .profile-name { font-family:var(--font-display); font-size:36px; font-weight:900; text-transform:uppercase; line-height:1.1; }
    .profile-meta { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
    .profile-actions { display:flex; flex-direction:column; gap:10px; }

    /* ── STATS ROW ────────────────── */
    .stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:28px; }
    .stat-card { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius); padding:22px 18px; text-align:center; transition:var(--transition); }
    .stat-card:hover { border-color:rgba(0,76,246,0.3); transform:translateY(-2px); }
    .stat-icon { font-size:22px; margin-bottom:8px; }
    .stat-val { font-family:var(--font-display); font-size:30px; font-weight:900; color:var(--blue); line-height:1; }
    .stat-key { font-size:10px; color:var(--white-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }

    /* ── STREAK CARD ──────────────── */
    .streak-card {
      background: var(--black-card); border: 1px solid var(--black-border);
      border-radius: var(--radius-lg); padding: 32px 36px; margin-bottom: 28px;
      display: grid; grid-template-columns: auto 1fr; gap: 32px; align-items: center;
      position: relative; overflow: hidden;
    }
    .streak-card::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,rgba(249,115,22,0.06) 0%,transparent 50%); pointer-events:none; }
    .streak-big-num { font-family:var(--font-display); font-size:96px; font-weight:900; line-height:1; color:#f97316; }
    .streak-big-num.zero { color:var(--blue); }
    .streak-info-title { font-family:var(--font-display); font-size:22px; font-weight:800; text-transform:uppercase; margin-bottom:6px; }
    .streak-info-desc { font-size:14px; color:var(--white-muted); line-height:1.6; margin-bottom:20px; }
    .streak-sub-stats { display:flex; gap:20px; flex-wrap:wrap; }
    .sss-item { text-align:center; padding:12px 16px; background:var(--white-soft); border-radius:var(--radius-sm); }
    .sss-val { font-family:var(--font-display); font-size:24px; font-weight:900; color:var(--blue); }
    .sss-key { font-size:10px; color:var(--white-muted); text-transform:uppercase; letter-spacing:0.5px; }
    .streak-next { margin-top:16px; padding:12px 16px; background:rgba(249,115,22,0.08); border:1px solid rgba(249,115,22,0.2); border-radius:var(--radius-sm); font-size:13px; color:#f97316; }

    /* ── HEATMAP ──────────────────── */
    .heatmap-card { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius-lg); padding:32px 36px; margin-bottom:28px; }
    .heatmap-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .heatmap-title { font-family:var(--font-display); font-size:22px; font-weight:800; text-transform:uppercase; }
    .heatmap-legend { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--white-muted); }
    .hm-dot { width:10px; height:10px; border-radius:2px; }
    .hm-empty { background:var(--black-border); }
    .hm-full  { background:var(--blue); }
    .heatmap-grid { overflow-x:auto; }
    .heatmap-weeks { display:flex; gap:3px; }
    .heatmap-week { display:flex; flex-direction:column; gap:3px; }
    .hm-cell { width:13px; height:13px; border-radius:2px; cursor:default; position:relative; flex-shrink:0; }
    .hm-cell.empty   { background:var(--black-border); }
    .hm-cell.trained { background:var(--blue); }
    .hm-cell.future  { background:transparent; border:1px solid var(--black-border); opacity:0.3; }
    .hm-cell.today   { outline:2px solid var(--blue); outline-offset:1px; }
    .hm-cell:hover::after { content:attr(data-tip); position:absolute; bottom:18px; left:50%; transform:translateX(-50%); background:var(--black-card); border:1px solid var(--black-border); border-radius:4px; padding:3px 8px; font-size:10px; white-space:nowrap; pointer-events:none; z-index:10; color:var(--white); }
    .day-labels { display:flex; flex-direction:column; gap:3px; margin-right:4px; }
    .day-label-item { height:13px; font-size:8px; color:var(--white-muted); display:flex; align-items:center; }

    /* ── CONQUISTAS ───────────────── */
    .conquistas-card { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius-lg); padding:32px 36px; margin-bottom:28px; }
    .conquistas-title { font-family:var(--font-display); font-size:22px; font-weight:800; text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:10px; justify-content:space-between; }
    .conquistas-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .conquista-item { background:var(--black); border:1.5px solid var(--black-border); border-radius:var(--radius); padding:20px 16px; text-align:center; transition:var(--transition); }
    .conquista-item.unlocked { border-color:rgba(249,115,22,0.4); background:rgba(249,115,22,0.06); }
    .conquista-item.unlocked:hover { transform:translateY(-4px); box-shadow:0 0 20px rgba(249,115,22,0.15); }
    .cq-emoji { font-size:32px; margin-bottom:8px; filter:grayscale(1) opacity(0.3); }
    .conquista-item.unlocked .cq-emoji { filter:none; }
    .cq-title { font-size:12px; font-weight:700; margin-bottom:4px; color:var(--white-muted); }
    .conquista-item.unlocked .cq-title { color:var(--white); }
    .cq-desc { font-size:10px; color:var(--white-muted); line-height:1.4; }
    .cq-meta { font-size:10px; color:#f97316; margin-top:6px; font-weight:600; }
    .cq-locked { font-size:10px; color:var(--white-muted); margin-top:4px; }

    /* ── PROGRESSÃO ───────────────── */
    .prog-card { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius-lg); padding:32px 36px; margin-bottom:28px; }
    .prog-title { font-family:var(--font-display); font-size:22px; font-weight:800; text-transform:uppercase; margin-bottom:20px; }
    .prog-mult-display { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
    .prog-mult-num { font-family:var(--font-display); font-size:72px; font-weight:900; color:#f97316; line-height:1; }
    .prog-mult-label { font-size:14px; color:var(--white-muted); line-height:1.6; }
    .prog-mult-label strong { color:var(--white); display:block; font-size:16px; margin-bottom:4px; }
    .prog-steps { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
    .prog-step { padding:12px 8px; text-align:center; border-radius:var(--radius-sm); background:var(--black-border); }
    .prog-step.done { background:rgba(249,115,22,0.15); border:1px solid rgba(249,115,22,0.3); }
    .prog-step.current { background:rgba(249,115,22,0.3); border:1px solid rgba(249,115,22,0.6); }
    .ps-mult { font-family:var(--font-display); font-size:18px; font-weight:900; color:var(--white-muted); }
    .prog-step.done .ps-mult, .prog-step.current .ps-mult { color:#f97316; }
    .ps-label { font-size:9px; color:var(--white-muted); text-transform:uppercase; margin-top:2px; }

    /* ── BOTTOM ───────────────────── */
    .bottom-grid { display:grid; grid-template-columns:2fr 1fr; gap:24px; }
    .history-card { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius-lg); padding:32px; }
    .history-title { font-family:var(--font-display); font-size:20px; font-weight:800; text-transform:uppercase; margin-bottom:18px; }
    .history-list { display:flex; flex-direction:column; gap:6px; }
    .history-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--white-soft); border-radius:var(--radius-sm); font-size:12px; gap:10px; }
    .hi-dot { width:7px; height:7px; background:var(--blue); border-radius:50%; flex-shrink:0; }
    .hi-tipo { font-weight:600; flex:1; }
    .hi-date { color:var(--white-muted); white-space:nowrap; }
    .goals-card { background:var(--black-card); border:1px solid var(--black-border); border-radius:var(--radius-lg); padding:32px; }
    .goals-title { font-family:var(--font-display); font-size:20px; font-weight:800; text-transform:uppercase; margin-bottom:18px; }
    .goal-item { margin-bottom:18px; }
    .goal-header { display:flex; justify-content:space-between; margin-bottom:7px; font-size:13px; }
    .goal-label { font-weight:600; }
    .goal-val { color:var(--blue); font-weight:700; }

    /* Theme button */
    .theme-btn { position:fixed; bottom:24px; left:24px; width:48px; height:48px; background:var(--black-card); border:1px solid var(--black-border); border-radius:50%; font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:var(--transition); z-index:100; }
    .theme-btn:hover { border-color:var(--blue); transform:scale(1.1); }

    /* ── RESPONSIVE ─────────────── */
    @media (max-width:1000px) {
      .stats-row { grid-template-columns:repeat(3,1fr); }
      .conquistas-grid { grid-template-columns:repeat(3,1fr); }
      .bottom-grid { grid-template-columns:1fr; }
      .prog-steps { grid-template-columns:repeat(5,1fr); }
    }
    @media (max-width:700px) {
      .profile-hero { grid-template-columns:1fr; text-align:center; padding:28px 24px; }
      .profile-meta { justify-content:center; }
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .conquistas-grid { grid-template-columns:repeat(2,1fr); }
      .streak-card { grid-template-columns:1fr; gap:16px; }
      .streak-big-num { font-size:72px; }
      .prog-steps { grid-template-columns:repeat(5,1fr); gap:4px; }
      .perfil-layout { padding:32px 20px 60px; }
      .avatar { margin:0 auto; }
      .heatmap-card, .conquistas-card, .prog-card { padding:24px 20px; }
    }
    @media (max-width:480px) {
      .conquistas-grid { grid-template-columns:repeat(2,1fr); }
      .prog-steps { grid-template-columns:repeat(3,1fr); gap:6px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="nav-logo">
    <div class="nav-logo-icon">🏠</div>
    <div class="nav-logo-text">Shape<span>House</span></div>

  <div class="nav-links">

    <a href="exercicios.html">Exercícios</a>

  </div>
  <div class="nav-hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="mobile-nav">
  <a href="../index.html">🏠 Home</a>
  <a href="exercicios.html">💪 Exercícios</a>
  <a href="cronograma.html">📅 Cronograma</a>

<div class="page-wrapper">
  <div class="page-header">
    <div class="section-tag">Dashboard</div>
    <h1 class="page-header-title">Meu <span>Painel</span></h1>
    <p class="page-header-sub">Streak, conquistas, heatmap e evolução física</p>
  </div>
  <div class="perfil-layout" id="perfil-content"></div>
</div>

<button class="theme-btn" id="theme-btn" title="Alternar tema">🌙</button>

<script src="../script.js"></script>
<script src="../progression.js"></script>
<script>

  function renderPerfil() {
    const user    = UserDB.getUser();
    const content = document.getElementById('perfil-content');

    if (!user) {
      content.innerHTML = `<div style="text-align:center;padding:80px 40px">
        <div style="font-size:80px;margin-bottom:24px">👤</div>
        <h2 style="font-family:var(--font-display);font-size:36px;font-weight:900;text-transform:uppercase;margin-bottom:12px">Sem Dados</h2>
        <p style="color:var(--white-muted);margin-bottom:32px">Faça seu cadastro para ver seu painel completo.</p>
        <a href="cadastro.html" class="btn btn-primary btn-lg">→ Fazer Cadastro</a>
      </div>`;
      return;
    }

    const imc      = calcularIMC(user.peso, user.altura);
    const cl       = classificarIMC(imc);
    const sugs     = sugestoesIMC(imc, user.nivel);
    const stats    = ProgressionDB.getStats();
    const prog     = ProgressionDB.getNivelProg();
    const earned   = new Set(ProgressionDB.getConquistas());
    const hist     = UserDB.getHistorico();
    const cron     = UserDB.getCronograma();
    const alturaM  = (user.altura / 100).toFixed(2);

    const nivelLabel = { iniciante:'🌱 Iniciante', intermediario:'⚡ Intermediário', avancado:'🔥 Avançado' };

    // ── Profile hero
    const heroHTML = `<div class="profile-hero animate-fade-up">
      <div class="avatar">${user.nome.charAt(0).toUpperCase()}</div>
      <div>
        <div class="profile-name">${user.nome}</div>
        <div class="profile-meta">
          <span class="badge badge-blue">${nivelLabel[user.nivel]||user.nivel}</span>
          <span class="badge ${cl.badge}">${cl.emoji} IMC: ${imc}</span>
          <span class="badge" style="background:var(--white-soft);color:var(--white-muted)">${user.idade} anos</span>
          ${stats.treinoHoje ? '<span class="badge" style="background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.3)">✓ Treinou hoje</span>' : ''}
        </div>
      </div>
      <div class="profile-actions">
        <a href="cadastro.html" class="btn btn-ghost btn-sm">✏️ Editar</a>
        <a href="cronograma.html" class="btn btn-primary btn-sm">📅 Treinar</a>
      </div>
    </div>`;

    // ── Stats row
    const statsHTML = `<div class="stats-row animate-fade-up-delay-2">
      <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-val" style="color:${stats.streakAtual>=7?'#f97316':'var(--blue)'}">${stats.streakAtual}</div><div class="stat-key">Streak atual</div></div>
      <div class="stat-card"><div class="stat-icon">💪</div><div class="stat-val">${stats.totalTreinos}</div><div class="stat-key">Treinos totais</div></div>
      <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val">${stats.semanaAtual}</div><div class="stat-key">Esta semana</div></div>
      <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val" style="color:${cl.cor}">${imc}</div><div class="stat-key">IMC</div></div>
      <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-val" style="font-size:22px">${prog.multiplicador.toFixed(2)}×</div><div class="stat-key">Progressão</div></div>
    </div>`;

    // ── Streak card
    const nextStreakMilestone = [3,7,14,21,30,60,100].find(m => m > stats.streakAtual) || 100;
    const daysToNext = nextStreakMilestone - stats.streakAtual;
    const streakDesc = stats.streakAtual === 0
      ? 'Comece hoje! Complete seu primeiro treino e inicie seu streak.'
      : stats.streakAtual === 1
      ? 'Ótimo começo! Treine amanhã para manter o streak.'
      : `${stats.streakAtual} dias consecutivos. Continue assim!`;

    const streakHTML = `<div class="streak-card animate-fade-up-delay-2">
      <div>
        <div class="streak-big-num ${stats.streakAtual===0?'zero':''}">${stats.streakAtual===0?'💤':stats.streakAtual>=30?'🌟':stats.streakAtual>=7?'🔥':'⚡'}<br>${stats.streakAtual}</div>
      </div>
      <div>
        <div class="streak-info-title">Streak de Treinos</div>
        <div class="streak-info-desc">${streakDesc}</div>
        <div class="streak-sub-stats">
          <div class="sss-item"><div class="sss-val">${stats.streakMaior}</div><div class="sss-key">Maior streak</div></div>
          <div class="sss-item"><div class="sss-val">${stats.semanaAtual}/7</div><div class="sss-key">Esta semana</div></div>
          <div class="sss-item"><div class="sss-val">${stats.totalTreinos}</div><div class="sss-key">Total treinos</div></div>
        </div>
        <div class="streak-next">
          🎯 ${daysToNext === 1 ? 'Falta 1 dia' : `Faltam ${daysToNext} dias`} para atingir ${nextStreakMilestone} dias seguidos!
        </div>
      </div>
    </div>`;

    // ── Heatmap
    const heatmapData = ProgressionDB.getHeatmapData();
    const hoje        = new Date().toISOString().split('T')[0];
    const totalHeat   = heatmapData.flat().filter(c => c.treinou).length;

    const weeksHTML = heatmapData.map(semana => {
      const cellsHTML = semana.map(cell => {
        let cls = 'hm-cell';
        if (cell.futuro)       cls += ' future';
        else if (cell.treinou) cls += ' trained';
        else                   cls += ' empty';
        if (cell.iso === hoje) cls += ' today';
        return `<div class="${cls}" data-tip="${cell.iso}${cell.treinou?' ✓':''}"></div>`;
      }).join('');
      return `<div class="heatmap-week">${cellsHTML}</div>`;
    }).join('');

    const dayLabelsHTML = ['Seg','','Qua','','Sex','','Dom'].map(d =>
      `<div class="day-label-item">${d}</div>`
    ).join('');

    const heatmapHTML = `<div class="heatmap-card animate-fade-up-delay-3">
      <div class="heatmap-header">
        <div class="heatmap-title">📅 Atividade — Últimas 16 Semanas</div>
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--white-muted)">${totalHeat} treinos registrados</span>
          <div class="heatmap-legend">
            <div class="hm-dot hm-empty"></div><span>Sem treino</span>
            <div class="hm-dot hm-full" style="margin-left:8px"></div><span>Treinou</span>
          </div>
        </div>
      </div>
      <div class="heatmap-grid">
        <div style="display:flex;gap:4px;align-items:flex-start">
          <div class="day-labels">${dayLabelsHTML}</div>
          <div class="heatmap-weeks">${weeksHTML}</div>
        </div>
      </div>
    </div>`;

    // ── Conquistas
    const conquistasHTML = `<div class="conquistas-card animate-fade-up-delay-3">
      <div class="conquistas-title">
        <span>🏆 Conquistas</span>
        <span style="font-size:14px;font-weight:400;color:var(--white-muted)">${earned.size}/${CONQUISTAS_DEF.length} desbloqueadas</span>
      </div>
      <div class="conquistas-grid">
        ${CONQUISTAS_DEF.map(c => {
          const unlocked = earned.has(c.id);
          const curr = c.tipo === 'streak' ? stats.streakAtual : stats.totalTreinos;
          const pct  = Math.min(100, Math.round((curr / c.meta) * 100));
          return `<div class="conquista-item ${unlocked?'unlocked':''}">
            <div class="cq-emoji">${c.emoji}</div>
            <div class="cq-title">${c.titulo}</div>
            <div class="cq-desc">${c.desc}</div>
            ${unlocked
              ? `<div class="cq-meta">✓ Desbloqueada</div>`
              : `<div class="cq-locked">${pct}% — ${c.meta - curr} restante${c.meta - curr !== 1 ? 's' : ''}</div>
                 <div style="margin-top:6px;height:3px;background:var(--black-border);border-radius:99px;overflow:hidden">
                   <div style="height:100%;width:${pct}%;background:rgba(249,115,22,0.5);border-radius:99px"></div>
                 </div>`
            }
          </div>`;
        }).join('')}
      </div>
    </div>`;

    // ── Progressão
    const multSteps = [1.0, 1.1, 1.2, 1.3, 1.5, 1.7, 2.0];
    const currentStep = multSteps.findIndex(m => m > prog.multiplicador) - 1;
    const stepsHTML = multSteps.map((m, i) => {
      const isDone    = prog.multiplicador >= m;
      const isCurrent = Math.abs(prog.multiplicador - m) < 0.01;
      let cls = 'prog-step';
      if (isCurrent) cls += ' current';
      else if (isDone) cls += ' done';
      const semsLabel = i === 0 ? 'Início' : `${i*2} sem.`;
      return `<div class="${cls}"><div class="ps-mult">${m.toFixed(1)}×</div><div class="ps-label">${semsLabel}</div></div>`;
    }).join('');

    const semanasRestantes = 2 - (prog.semanas_ok % 2);
    const progHTML = `<div class="prog-card animate-fade-up-delay-4">
      <div class="prog-title">📈 Progressão Automática</div>
      <div class="prog-mult-display">
        <div class="prog-mult-num">${prog.multiplicador.toFixed(2)}×</div>
        <div class="prog-mult-label">
          <strong>Multiplicador atual de reps</strong>
          ${prog.multiplicador > 1.0
            ? `Suas reps foram aumentadas ${Math.round((prog.multiplicador-1)*100)}% em relação ao início.`
            : 'Complete 3+ treinos por semana para ativar a progressão automática.'
          }
          <div style="margin-top:8px;font-size:13px;color:var(--white-muted)">
            ${prog.multiplicador < 2.0
              ? `Semanas boas: <strong style="color:var(--white)">${prog.semanas_ok}</strong> · Próximo aumento em <strong style="color:var(--white)">${semanasRestantes} semana${semanasRestantes!==1?'s':''}</strong>`
              : '🎉 Progressão máxima atingida (2.0×)!'
            }
          </div>
        </div>
      </div>
      <div class="prog-steps">${stepsHTML}</div>
    </div>`;

    // ── IMC card (compacto)
    let pct = 0;
    if (imc <= 15)        pct = 0;
    else if (imc <= 18.5) pct = ((imc-15)/3.5)*22;
    else if (imc <= 25)   pct = 22+((imc-18.5)/6.5)*28;
    else if (imc <= 30)   pct = 50+((imc-25)/5)*22;
    else                  pct = Math.min(72+((imc-30)/10)*28, 98);

    const imcHTML = `<div class="card-flat animate-fade-up-delay-4" style="margin-bottom:28px;padding:32px 36px">
      <div style="display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:center">
        <div>
          <div style="font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--white-muted);margin-bottom:8px">IMC Atual</div>
          <div style="font-family:var(--font-display);font-size:80px;font-weight:900;line-height:1;color:${cl.cor}">${imc}</div>
          <div style="font-family:var(--font-display);font-size:20px;font-weight:700;text-transform:uppercase;margin-top:4px">${cl.emoji} ${cl.label}</div>
          <div style="font-size:12px;color:var(--white-muted);margin-top:6px">
            ${user.peso}kg · ${alturaM}m · Fórmula: ${user.peso}/(${alturaM})²
          </div>
        </div>
        <div>
          <div style="position:relative;height:10px;background:var(--black-border);border-radius:99px;overflow:hidden;margin-bottom:8px">
            <div style="display:flex;height:100%">
              <div style="flex:1.6;background:#eab308"></div>
              <div style="flex:1.5;background:#22c55e"></div>
              <div style="flex:1.1;background:#f97316"></div>
              <div style="flex:1.8;background:#ef4444;border-radius:0 99px 99px 0"></div>
            </div>
            <div style="position:absolute;top:-3px;left:${pct}%;width:16px;height:16px;background:var(--white);border-radius:50%;border:2px solid var(--blue);transform:translateX(-50%);transition:left 0.6s ease"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--white-muted);margin-bottom:20px">
            <span>Abaixo &lt;18.5</span><span>Normal 18.5–25</span><span>Sobr. 25–30</span><span>&gt;30</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${sugs.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--white-muted);padding:8px 12px;background:var(--white-soft);border-radius:var(--radius-sm)">💡 ${s}</div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;

    // ── Bottom grid
    const histHTML = `<div class="history-card">
      <div class="history-title">📋 Histórico</div>
      ${hist.length===0
        ? `<div style="text-align:center;padding:32px;color:var(--white-muted)">
             <div style="font-size:36px;margin-bottom:10px">📭</div>
             <p>Nenhuma atividade ainda.</p>
             <a href="cronograma.html" class="btn btn-ghost btn-sm" style="margin-top:14px;display:inline-flex">Ir Treinar</a>
           </div>`
        : `<div class="history-list">
             ${hist.slice(0,12).map(h=>`
               <div class="history-item">
                 <div class="hi-dot"></div>
                 <div class="hi-tipo">${h.tipo}</div>
                 <div class="hi-date">${h.data}</div>
               </div>`).join('')}
           </div>`
      }
    </div>`;

    const goalsHTML = `<div class="goals-card">
      <div class="goals-title">🎯 Metas</div>
      <div class="goal-item">
        <div class="goal-header"><span class="goal-label">🔥 Streak</span><span class="goal-val">${Math.min(Math.round((stats.streakAtual/30)*100),100)}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(Math.round((stats.streakAtual/30)*100),100)}%"></div></div>
        <div style="font-size:11px;color:var(--white-muted);margin-top:4px">${stats.streakAtual}/30 dias</div>
      </div>
      <div class="goal-item">
        <div class="goal-header"><span class="goal-label">💪 Treinos</span><span class="goal-val">${Math.min(Math.round((stats.totalTreinos/50)*100),100)}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(Math.round((stats.totalTreinos/50)*100),100)}%;background:#22c55e"></div></div>
        <div style="font-size:11px;color:var(--white-muted);margin-top:4px">${stats.totalTreinos}/50 treinos</div>
      </div>
      <div class="goal-item">
        <div class="goal-header"><span class="goal-label">📅 Semana</span><span class="goal-val">${Math.round((stats.semanaAtual/4)*100)}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.round((stats.semanaAtual/4)*100)}%;background:#f97316"></div></div>
        <div style="font-size:11px;color:var(--white-muted);margin-top:4px">${stats.semanaAtual}/4 treinos na semana</div>
      </div>
      <div class="goal-item">
        <div class="goal-header"><span class="goal-label">⚖️ IMC Ideal</span><span class="goal-val">${imc>=18.5&&imc<25?100:Math.max(0,100-Math.round(Math.abs(22-imc)*10))}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${imc>=18.5&&imc<25?100:Math.max(10,100-Math.round(Math.abs(22-imc)*10))}%;background:${cl.cor}"></div></div>
      </div>
      <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-ghost btn-sm btn-full" id="btn-clear">🗑️ Limpar todos os dados</button>
      </div>
    </div>`;

    content.innerHTML =
      heroHTML + statsHTML + streakHTML + heatmapHTML + conquistasHTML + progHTML + imcHTML +
      `<div class="bottom-grid animate-fade-up-delay-5">${histHTML}${goalsHTML}</div>`;

    document.getElementById('btn-clear')?.addEventListener('click', () => {
      if (confirm('Tem certeza? Todos os dados serão apagados permanentemente.')) {
        [
          'sh_user','sh_cronograma','sh_historico',
          PROG_KEYS.TREINOS, PROG_KEYS.CONQUISTAS, PROG_KEYS.NIVEL_PROG
        ].forEach(k => localStorage.removeItem(k));
        showToast('Dados apagados!','info');
        setTimeout(() => renderPerfil(), 400);
      }
    });
  }

  // ── Theme toggle
  document.getElementById('theme-btn').addEventListener('click', () => {
    toggleTheme();
    document.getElementById('theme-btn').textContent =
      document.documentElement.getAttribute('data-theme') === 'dark' ? '🌙' : '☀️';
  });
  document.getElementById('theme-btn').textContent =
    document.documentElement.getAttribute('data-theme') === 'dark' ? '🌙' : '☀️';

  renderPerfil();
</script>
</body>
</html>
